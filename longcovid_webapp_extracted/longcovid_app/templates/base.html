<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Long COVID Risk Assessment{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    /* ── Design tokens ───────────────────────────────────────────────── */
    :root {
      --bg:        #0a0e1a;
      --surface:   #111827;
      --surface2:  #1a2236;
      --border:    #1f2d45;
      --accent:    #00c2ff;
      --accent2:   #7c3aed;
      --danger:    #ef4444;
      --warning:   #f59e0b;
      --success:   #10b981;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --mono:      'Space Mono', monospace;
      --sans:      'DM Sans', sans-serif;
      --radius:    10px;
      --shadow:    0 4px 24px rgba(0,0,0,0.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Top nav ─────────────────────────────────────────────────────── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,14,26,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
    }
    .nav-brand {
      display: flex; align-items: center; gap: .75rem;
      font-family: var(--mono); font-size: .85rem;
      color: var(--accent); text-decoration: none;
    }
    .nav-brand .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform: scale(1); }
      50%      { opacity:.4; transform: scale(1.4); }
    }
    .nav-links { display: flex; gap: .25rem; }
    .nav-links a {
      padding: .4rem .9rem;
      border-radius: 6px;
      font-size: .85rem;
      color: var(--muted);
      text-decoration: none;
      transition: all .2s;
      font-family: var(--mono);
    }
    .nav-links a:hover,
    .nav-links a.active {
      background: var(--surface2);
      color: var(--accent);
    }

    /* ── Page wrapper ────────────────────────────────────────────────── */
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
    }

    /* ── Cards ───────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
      box-shadow: var(--shadow);
    }
    .card-title {
      font-family: var(--mono);
      font-size: .8rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    /* ── Grid ────────────────────────────────────────────────────────── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.5rem; }
    .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 1.25rem; }

    /* ── Stat card ───────────────────────────────────────────────────── */
    .stat {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
    }
    .stat-label { font-size: .75rem; color: var(--muted); font-family: var(--mono); margin-bottom: .4rem; }
    .stat-value { font-size: 1.8rem; font-weight: 600; }
    .stat-sub   { font-size: .8rem; color: var(--muted); margin-top: .2rem; }

    /* ── Buttons ─────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: .5rem;
      padding: .6rem 1.4rem;
      border-radius: 8px;
      border: none; cursor: pointer;
      font-family: var(--mono); font-size: .85rem;
      transition: all .2s;
    }
    .btn-primary { background: var(--accent); color: #000; font-weight: 700; }
    .btn-primary:hover { background: #00a0d4; transform: translateY(-1px); }
    .btn-ghost {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }

    /* ── Forms ───────────────────────────────────────────────────────── */
    .form-group { margin-bottom: 1.25rem; }
    label {
      display: block;
      font-size: .8rem; font-family: var(--mono);
      color: var(--muted); margin-bottom: .4rem;
    }
    input, select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: .65rem 1rem;
      font-family: var(--sans); font-size: .9rem;
      transition: border-color .2s;
      outline: none;
    }
    input:focus, select:focus { border-color: var(--accent); }
    select option { background: var(--surface); }

    /* ── Toggle switch ───────────────────────────────────────────────── */
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: .7rem 0;
      border-bottom: 1px solid var(--border);
    }
    .toggle-row:last-child { border-bottom: none; }
    .toggle-label { font-size: .9rem; }
    .toggle {
      position: relative; width: 44px; height: 24px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: var(--border);
      border-radius: 24px;
      cursor: pointer;
      transition: .3s;
    }
    .toggle-slider::before {
      content: "";
      position: absolute; left: 3px; top: 3px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--muted);
      transition: .3s;
    }
    .toggle input:checked + .toggle-slider { background: var(--accent); }
    .toggle input:checked + .toggle-slider::before {
      transform: translateX(20px);
      background: #000;
    }

    /* ── Badges ──────────────────────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: .2rem .65rem;
      border-radius: 20px;
      font-size: .72rem;
      font-family: var(--mono);
      font-weight: 700;
    }
    .badge-low      { background: rgba(16,185,129,.15); color: #10b981; }
    .badge-moderate { background: rgba(245,158,11,.15);  color: #f59e0b; }
    .badge-high     { background: rgba(239,68,68,.15);   color: #ef4444; }
    .badge-critical { background: rgba(239,68,68,.25);   color: #ff2020; }

    /* ── Page header ─────────────────────────────────────────────────── */
    .page-header { margin-bottom: 2.5rem; }
    .page-header h1 {
      font-family: var(--mono); font-size: 1.6rem;
      color: var(--text);
    }
    .page-header h1 span { color: var(--accent); }
    .page-header p { color: var(--muted); margin-top: .4rem; font-size: .9rem; }

    /* ── Section title ───────────────────────────────────────────────── */
    .section-title {
      font-family: var(--mono);
      font-size: .75rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 2rem 0 1rem;
      display: flex; align-items: center; gap: .75rem;
    }
    .section-title::after {
      content: "";
      flex: 1; height: 1px; background: var(--border);
    }

    /* ── Log console ─────────────────────────────────────────────────── */
    .log-console {
      background: #050810;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      height: 260px;
      overflow-y: auto;
      font-family: var(--mono);
      font-size: .78rem;
      color: #8fa3c2;
      line-height: 1.7;
    }
    .log-console .ok   { color: var(--success); }
    .log-console .err  { color: var(--danger); }
    .log-console .info { color: var(--accent); }

    /* ── Progress bar ────────────────────────────────────────────────── */
    .progress-track {
      background: var(--surface2);
      border-radius: 4px; height: 6px;
      overflow: hidden; margin: .75rem 0;
    }
    .progress-fill {
      height: 100%; border-radius: 4px;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      transition: width .5s ease;
    }

    /* ── Plot grid ───────────────────────────────────────────────────── */
    .plot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.25rem;
    }
    .plot-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: border-color .2s, transform .2s;
    }
    .plot-item:hover { border-color: var(--accent); transform: translateY(-2px); }
    .plot-item img { width: 100%; display: block; }

    /* ── Lightbox ────────────────────────────────────────────────────── */
    #lightbox {
      display: none; position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,.85);
      align-items: center; justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 90vw; max-height: 90vh;
      border-radius: var(--radius);
      box-shadow: 0 8px 48px rgba(0,0,0,.8);
    }
    #lightbox-close {
      position: absolute; top: 1.5rem; right: 1.5rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 50%; width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text); font-size: 1.1rem;
    }

    /* ── Risk gauge ──────────────────────────────────────────────────── */
    .risk-gauge {
      text-align: center; padding: 2rem;
    }
    .risk-score-big {
      font-family: var(--mono);
      font-size: 4rem; font-weight: 700;
      line-height: 1;
    }
    .risk-level-label {
      font-family: var(--mono);
      font-size: 1rem; letter-spacing: .15em;
      margin-top: .5rem;
    }

    /* ── Table ───────────────────────────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    th {
      text-align: left;
      font-family: var(--mono); font-size: .72rem;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--muted);
      padding: .6rem .75rem;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: .65rem .75rem;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    /* ── Alerts ──────────────────────────────────────────────────────── */
    .alert {
      padding: .9rem 1.25rem;
      border-radius: var(--radius);
      font-size: .88rem;
      margin-bottom: 1rem;
    }
    .alert-info    { background: rgba(0,194,255,.08); border: 1px solid rgba(0,194,255,.2); }
    .alert-warning { background: rgba(245,158,11,.08); border: 1px solid rgba(245,158,11,.2); color: #f59e0b; }
    .alert-error   { background: rgba(239,68,68,.08);  border: 1px solid rgba(239,68,68,.2); color: #ef4444; }

    /* ── Tabs ────────────────────────────────────────────────────────── */
    .tabs { display: flex; gap: .25rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .tab-btn {
      padding: .45rem 1rem;
      border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      cursor: pointer; font-family: var(--mono); font-size: .8rem;
      transition: all .2s;
    }
    .tab-btn.active { background: var(--surface2); color: var(--accent); border-color: var(--accent); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Upload zone ─────────────────────────────────────────────────── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
    }
    .upload-zone:hover,
    .upload-zone.drag { border-color: var(--accent); background: rgba(0,194,255,.04); }
    .upload-icon { font-size: 2.5rem; margin-bottom: .75rem; }
    .upload-text { color: var(--muted); font-size: .9rem; }
    .upload-text strong { color: var(--accent); }

    /* ── Utilities ───────────────────────────────────────────────────── */
    .mt1 { margin-top: .5rem; }
    .mt2 { margin-top: 1rem; }
    .mt3 { margin-top: 1.5rem; }
    .gap1 { gap: .5rem; }
    .flex { display: flex; }
    .flex-col { display: flex; flex-direction: column; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .text-muted { color: var(--muted); }
    .text-sm { font-size: .82rem; }
    .mono { font-family: var(--mono); }
    .hidden { display: none !important; }

    /* ── Responsive ──────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
      main { padding: 1.5rem 1rem; }
      nav { padding: 0 1rem; }
      .nav-links a { padding: .4rem .6rem; font-size: .78rem; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<nav>
  <a class="nav-brand" href="/">
    <span class="dot"></span>
    LONG_COVID / RISK_MODEL
  </a>
  <div class="nav-links">
    <a href="/"          id="nav-home">HOME</a>
    <a href="/dashboard" id="nav-dash">DASHBOARD</a>
    <a href="/pipeline"  id="nav-pipe">PIPELINE</a>
    <a href="/predictor" id="nav-pred">PREDICTOR</a>
  </div>
</nav>

<main>
  {% block content %}{% endblock %}
</main>

<!-- Lightbox -->
<div id="lightbox">
  <div id="lightbox-close" onclick="closeLightbox()">✕</div>
  <img id="lightbox-img" src="" alt=""/>
</div>

<script>
  // Highlight active nav link
  const path = window.location.pathname;
  const map = { '/': 'nav-home', '/dashboard': 'nav-dash', '/pipeline': 'nav-pipe', '/predictor': 'nav-pred' };
  if (map[path]) document.getElementById(map[path])?.classList.add('active');

  // Lightbox
  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
  }
  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === document.getElementById('lightbox')) closeLightbox();
  });

  // Tabs
  function initTabs(containerSel) {
    document.querySelectorAll(containerSel + ' .tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const group = btn.closest('.tabs').dataset.group;
        document.querySelectorAll(`[data-group="${group}"] .tab-btn`).forEach(b => b.classList.remove('active'));
        document.querySelectorAll(`[data-tab-group="${group}"]`).forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.querySelector(`[data-tab-group="${group}"][data-tab="${btn.dataset.tab}"]`)?.classList.add('active');
      });
    });
  }
</script>

{% block scripts %}{% endblock %}
</body>
</html>
